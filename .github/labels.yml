# Repository label definitions, synced by .github/workflows/labels.yml.
# Edits here are the single source of truth — never edit labels directly in
# GitHub UI; they will be overwritten on next sync.

# Type labels — every issue and PR needs one.
- name: "type:feat"
  color: "0E8A16"
  description: "New user-facing feature."
- name: "type:fix"
  color: "D73A4A"
  description: "Bug fix."
- name: "type:docs"
  color: "0075CA"
  description: "Documentation only."
- name: "type:refactor"
  color: "A2EEEF"
  description: "Code change that neither adds a feature nor fixes a bug."
- name: "type:test"
  color: "FBCA04"
  description: "Adding or updating tests."
- name: "type:chore"
  color: "C5DEF5"
  description: "Tooling, deps, infra — no product behaviour change."
- name: "type:perf"
  color: "F9D0C4"
  description: "Performance improvement."

# Phase labels — track which roadmap phase the work belongs to.
- name: "phase:0"
  color: "1D76DB"
  description: "Phase 0 — Foundations."
- name: "phase:1"
  color: "5319E7"
  description: "Phase 1 — Home page."
- name: "phase:2"
  color: "B60205"
  description: "Phase 2 — Supporting pages."
- name: "phase:3"
  color: "F9D0C4"
  description: "Phase 3 — Polish and differentiation."

# Area labels — which domain the change touches.
- name: "area:i18n"
  color: "FEF2C0"
  description: "Translation contract or routing."
- name: "area:design-tokens"
  color: "FEF2C0"
  description: "Palette, typography, spacing, radius."
- name: "area:install"
  color: "FEF2C0"
  description: "Install widget and post-install lifecycle (sync, auto-update)."
- name: "area:demo"
  color: "FEF2C0"
  description: "/demo TUI reconstruction."
- name: "area:docs-page"
  color: "FEF2C0"
  description: "/docs product manual."
- name: "area:og"
  color: "FEF2C0"
  description: "Open Graph / Satori pipeline."
- name: "area:ci"
  color: "FEF2C0"
  description: "CI workflows, label sync, preview deploy."

# Status labels.
- name: "status:blocked"
  color: "B60205"
  description: "Cannot proceed without external input."
- name: "status:needs-design"
  color: "FBCA04"
  description: "Design decision required from a domain lead."
- name: "good first issue"
  color: "7057FF"
  description: "Approachable for new contributors."
- name: "help wanted"
  color: "008672"
  description: "Maintainer would welcome a contributor PR."
